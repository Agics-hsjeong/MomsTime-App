<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 01 Splash</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<style>
  .splash {
    justify-content: space-between;
    background: linear-gradient(180deg, #FFF8F9 0%, #FFF1F4 55%, #FDDDE6 100%);
  }
  .splash__brand {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 80px;
  }
  .splash__logo { width: 140px; height: 140px; }
  .splash__name {
    margin-top: 24px;
    font-size: 40px;
    font-weight: 800;
    color: var(--primary-strong);
    letter-spacing: -0.5px;
  }
  .splash__slogan { margin-top: 8px; font-size: 15px; color: var(--text-secondary); }
  /* 하단 일러스트 영역 (이미지 에셋 교체 예정) */
  .splash__illust {
    position: relative;
    height: 340px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }
  .splash__illust .blob {
    position: absolute;
    bottom: -140px;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    height: 340px;
    background: radial-gradient(ellipse at center, #F9BFD0 0%, #FBD3DF 55%, transparent 75%);
    border-radius: 50%;
  }
  .splash__illust .figure {
    position: relative;
    width: 220px;
    height: 300px;
    padding-bottom: 20px;
  }
  .splash__illust .heart { position: absolute; color: #F7A6BE; }
  .splash__illust .heart--1 { top: 40px; left: 15%; font-size: 22px; }
  .splash__illust .heart--2 { top: 90px; right: 18%; font-size: 16px; }
  .splash__enter { position:absolute; inset:0; z-index:9; }
  .splash__hint { position:absolute; left:0; right:0; bottom:36px; z-index:10; text-align:center; font-size:13px; color:var(--text-secondary); }
</style>
</head>
<body>
<div class="app splash">
  <a href="03_onboarding.html" class="splash__enter" aria-label="시작하기"></a>
  <p class="splash__hint">화면을 탭하여 시작하기</p>

  <div class="splash__brand">
    <!-- 로고 : 하트 + 엄마 라인 일러스트 -->
    <span class="splash__logo" data-illust="logo" aria-label="Mom's Time 로고"></span>
    <h1 class="splash__name">Mom&rsquo;s Time</h1>
    <p class="splash__slogan">엄마의 건강한 하루를 위한 동반자</p>
  </div>

  <!-- 일러스트 영역 : 실제 에셋(임산부 일러스트)으로 교체 -->
  <div class="splash__illust" aria-hidden="true">
    <div class="blob"></div>
    <span class="heart heart--1">💗</span>
    <span class="heart heart--2">💗</span>
    <div class="figure" data-illust="pregnant"></div>
  </div>

</div>
<script src="../assets/js/illustrations.js"></script>
<script src="../assets/js/common.js"></script>
</body>
</html>
