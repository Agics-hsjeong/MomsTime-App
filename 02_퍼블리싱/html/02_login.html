<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 02 Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<style>
  .login__brand { text-align: center; padding: 72px 0 40px; }
  .login__logo { width: 88px; height: 88px; margin: 0 auto; }
  .login__name { margin-top: 16px; font-size: 32px; font-weight: 800; color: var(--primary-strong); }
  .login__slogan { margin-top: 6px; font-size: 14px; color: var(--text-secondary); }

  /* 이메일/비밀번호 입력 카드 */
  .login-box {
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
  }
  .login-box__row {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 64px;
    padding: 0 18px;
  }
  .login-box__row + .login-box__row { border-top: 1px solid var(--divider); }
  .login-box__row .material-symbols-rounded { color: var(--primary-strong); font-size: 24px; }
  .login-box__row input {
    flex: 1; height: 100%; border: 0; outline: 0; background: transparent; font-size: 16px;
  }
  .login-box__row input::placeholder { color: var(--text-disabled); }
  .login-box__row .eye { color: var(--text-disabled); }

  .login-opts { display: flex; align-items: center; justify-content: space-between; margin: 16px 2px 24px; }
  .keep-login { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
  .keep-login input { width: 20px; height: 20px; accent-color: var(--primary-strong); border-radius: 6px; }
  .find-pw { display: inline-flex; align-items: center; font-size: 14px; color: var(--text-secondary); }
  .find-pw .material-symbols-rounded { font-size: 18px; }

  /* 소셜 로그인 */
  .sns-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; height: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    font-size: 16px; font-weight: 600;
  }
  .sns-btn + .sns-btn { margin-top: 12px; }
  .sns-btn__icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .sns-btn--kakao .sns-btn__icon {
    background: #FEE500; border-radius: 50%; font-size: 8px; font-weight: 800; color: #191919;
  }
  .signup { margin: 28px 0 40px; text-align: center; font-size: 14px; color: var(--text-secondary); }
  .signup a { font-weight: 700; color: var(--primary-strong); }
</style>
</head>
<body>
<div class="app">
  <div class="content">

    <div class="login__brand">
      <span class="login__logo" data-illust="logo" aria-label="Mom's Time 로고"></span>
      <h1 class="login__name">Mom&rsquo;s Time</h1>
      <p class="login__slogan">엄마의 건강한 하루를 위한 동반자</p>
    </div>

    <!-- 이메일 로그인 -->
    <div class="login-box">
      <div class="login-box__row">
        <span class="material-symbols-rounded">person</span>
        <input type="email" placeholder="이메일 주소를 입력해주세요" autocomplete="email">
      </div>
      <div class="login-box__row">
        <span class="material-symbols-rounded">lock</span>
        <input type="password" placeholder="비밀번호를 입력해주세요" autocomplete="current-password">
        <button type="button" class="eye" aria-label="비밀번호 표시">
          <span class="material-symbols-rounded">visibility_off</span>
        </button>
      </div>
    </div>

    <div class="login-opts">
      <label class="keep-login"><input type="checkbox"> 로그인 상태 유지</label>
      <a href="#" class="find-pw">비밀번호 찾기 <span class="material-symbols-rounded">chevron_right</span></a>
    </div>

    <a href="04_stage.html" class="btn btn--primary">로그인</a>

    <div class="or-divider">또는</div>

    <!-- 소셜 로그인 -->
    <a href="04_stage.html" class="sns-btn">
      <span class="sns-btn__icon">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#4285F4" d="M23.5 12.3c0-.9-.1-1.5-.3-2.2H12v4.3h6.5c-.1 1.1-.8 2.7-2.4 3.8l3.7 2.9c2.3-2.1 3.7-5.2 3.7-8.8z"/><path fill="#34A853" d="M12 24c3.2 0 6-1.1 8-2.9l-3.7-2.9c-1 .7-2.4 1.2-4.2 1.2-3.2 0-6-2.1-7-5.1l-3.9 3C3.1 21.3 7.2 24 12 24z"/><path fill="#FBBC05" d="M5 14.3c-.3-.7-.4-1.5-.4-2.3s.2-1.6.4-2.3l-3.9-3C.4 8.3 0 10.1 0 12s.4 3.7 1.1 5.3l3.9-3z"/><path fill="#EA4335" d="M12 4.7c1.8 0 3 .8 3.7 1.4L19 2.9C17 1.1 14.7 0 12 0 7.2 0 3.1 2.7 1.1 6.7l3.9 3c1-3 3.8-5 7-5z"/></svg>
      </span>
      Google로 계속하기
    </a>
    <a href="04_stage.html" class="sns-btn">
      <span class="sns-btn__icon">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M17.05 12.54c0-2.42 1.98-3.58 2.07-3.64-1.13-1.65-2.88-1.88-3.5-1.9-1.49-.15-2.9.87-3.66.87-.75 0-1.92-.85-3.16-.83-1.62.02-3.12.95-3.95 2.4-1.69 2.93-.43 7.27 1.21 9.65.8 1.16 1.76 2.47 3.01 2.42 1.21-.05 1.67-.78 3.13-.78 1.46 0 1.87.78 3.15.76 1.3-.02 2.13-1.18 2.92-2.35.92-1.35 1.3-2.66 1.32-2.73-.03-.01-2.53-.97-2.54-3.87zM14.65 5.13c.67-.81 1.12-1.94 1-3.06-.96.04-2.13.64-2.82 1.45-.62.72-1.16 1.87-1.02 2.97 1.08.08 2.17-.55 2.84-1.36z"/></svg>
      </span>
      Apple로 계속하기
    </a>
    <a href="04_stage.html" class="sns-btn sns-btn--kakao">
      <span class="sns-btn__icon">TALK</span>
      카카오로 계속하기
    </a>

    <p class="signup">계정이 없으신가요? <a href="#">회원가입 &rsaquo;</a></p>

  </div>
</div>
<script src="../assets/js/illustrations.js"></script>
<script src="../assets/js/common.js"></script>
</body>
</html>
