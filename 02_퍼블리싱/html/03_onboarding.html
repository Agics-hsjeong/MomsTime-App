<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 03 서비스 소개 1/3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<link rel="stylesheet" href="../assets/css/motion.css">
<link rel="stylesheet" href="../assets/css/onboarding.css">
</head>
<body>
<div class="app">

  <div class="onb-top">
    <a href="02_login.html" class="onb-skip-top">건너뛰기</a>
  </div>

  <div class="content" style="padding-top:0;">

    <p class="onb__step"><b>1</b> / 3</p>
    <h1 class="onb__headline">복약과 건강을<br><em>한 곳에서</em> 관리해요</h1>
    <p class="onb__desc">임신 준비부터 출산 후까지,<br>매일의 복약과 건강 기록을 놓치지 않도록 도와드려요.</p>

    <!-- 일러스트 -->
    <div class="onb__illust onb__illust--pink" aria-hidden="true">
      <div class="mini-card">
        <p class="mini-card__title">🤍 Today Care</p>
        <div class="mini-card__row">
          <span class="mini-card__pill"><span class="material-symbols-rounded" style="color:var(--primary-strong)">medication</span></span>
          <span class="mini-card__name">철분제<small>오전 9:00</small></span>
          <span class="mini-card__check"><span class="material-symbols-rounded">check</span></span>
        </div>
      </div>
      <div class="figure" data-illust="pregnant"></div>
    </div>

    <!-- 핵심 기능 하이라이트 -->
    <div class="onb-highlights">
      <div class="onb-hl">
        <span class="onb-hl__icon" style="background:var(--primary-light);"><span class="material-symbols-rounded" style="color:var(--primary-strong)">medication</span></span>
        <div>
          <p class="onb-hl__title">복약 관리</p>
          <p class="onb-hl__desc">약과 영양제를 등록하고 복용 시간을 알림으로 챙겨드려요.</p>
        </div>
      </div>
      <div class="onb-hl">
        <span class="onb-hl__icon" style="background:#FDF0DC;"><span class="material-symbols-rounded" style="color:var(--primary-strong)">calendar_month</span></span>
        <div>
          <p class="onb-hl__title">일정 관리</p>
          <p class="onb-hl__desc">병원 진료와 검사일을 캘린더로 한눈에 확인해요.</p>
        </div>
      </div>
    </div>

    <div class="onb-dots" aria-hidden="true">
      <span class="is-active"></span><span></span><span></span>
    </div>
  </div>

  <div class="bottom-cta">
    <a href="03_onboarding_2.html" class="btn btn--primary">다음 <span class="material-symbols-rounded">chevron_right</span></a>
  </div>
</div>
<script src="../assets/js/illustrations.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/motion.js"></script>
</body>
</html>
