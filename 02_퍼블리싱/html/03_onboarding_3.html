<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 03 서비스 소개 3/3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<link rel="stylesheet" href="../assets/css/onboarding.css">
</head>
<body>
<div class="app">

  <div class="onb-top">
    <a href="02_login.html" class="onb-skip-top">건너뛰기</a>
  </div>

  <div class="content" style="padding-top:0;">

    <p class="onb__step"><b>3</b> / 3</p>
    <h1 class="onb__headline">소중한 가족과<br><em>함께</em> 건강하게</h1>
    <p class="onb__desc">가족을 초대해 서로의 복약과 건강을 함께 관리하고,<br>맞춤 리포트로 변화를 확인해요.</p>

    <!-- 일러스트 : 임산부 + 가족 미니카드 -->
    <div class="onb__illust onb__illust--pink" aria-hidden="true">
      <div class="mini-card mini-card--right">
        <p class="mini-card__title">👨‍👩‍👧 우리 가족</p>
        <div class="mini-card__avatars">
          <span>👩🏻</span><span>👨🏻</span><span>👵🏻</span><span>👦🏻</span>
        </div>
        <p class="mini-card__name" style="margin-top:8px;">함께 관리 중<small>복약 · 검진 공유</small></p>
      </div>
      <div class="figure" data-illust="pregnant"></div>
    </div>

    <!-- 기능 하이라이트 -->
    <div class="onb-highlights">
      <div class="onb-hl">
        <span class="onb-hl__icon" style="background:var(--primary-light);">👨‍👩‍👧</span>
        <div>
          <p class="onb-hl__title">가족 공유</p>
          <p class="onb-hl__desc">가족을 초대해 복약 일정과 검진 결과를 함께 챙겨요.</p>
        </div>
      </div>
      <div class="onb-hl">
        <span class="onb-hl__icon" style="background:#E7F0FB;">📊</span>
        <div>
          <p class="onb-hl__title">건강 리포트</p>
          <p class="onb-hl__desc">복약률과 건강 변화를 리포트로 한눈에 확인해요.</p>
        </div>
      </div>
    </div>

    <div class="onb-dots" aria-hidden="true">
      <span></span><span></span><span class="is-active"></span>
    </div>
  </div>

  <div class="bottom-cta">
    <a href="02_login.html" class="btn btn--primary">시작하기</a>
  </div>
</div>
<script src="../assets/js/illustrations.js"></script>
<script src="../assets/js/common.js"></script>
</body>
</html>
