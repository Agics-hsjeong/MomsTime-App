<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 04 Stage</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<style>
  .stage-progress { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 4px; }
  .stage-progress__label { font-size: 14px; font-weight: 700; color: var(--primary-strong); }
  .stage-progress__bars { display: flex; gap: 6px; }
  .stage-progress__bars span { width: 26px; height: 5px; border-radius: 999px; background: #F5CBD8; }
  .stage-progress__bars .is-active { background: var(--primary-strong); }

  .stage__title { margin-top: 32px; text-align: center; font-size: 26px; font-weight: 800; }
  .stage__title em { font-style: normal; color: var(--primary-strong); }
  .stage__desc { margin-top: 12px; text-align: center; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  /* 단계 선택 카드 */
  .stage-card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    margin-top: 16px;
    padding: 20px;
    text-align: left;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
  }
  .stage-card.is-selected { background: #FFF0F4; border-color: var(--primary); }
  .stage-card__illust {
    width: 96px; height: 96px;
    border-radius: 18px;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    flex-shrink: 0;
  }
  .stage-card__body { flex: 1; }
  .stage-card__name { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; }
  .stage-card.is-selected .stage-card__name { color: var(--primary-strong); }
  .stage-card__name .chip { height: 24px; font-size: 11px; }
  .stage-card__desc { margin-top: 8px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .stage-card__arrow { color: var(--text-disabled); }
  .stage-card.is-selected .stage-card__arrow { color: var(--primary-strong); }
  .stage-card__check {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--primary-strong); color: #fff;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 3px 8px rgba(242,84,127,.35);
  }
  .stage-card__check .material-symbols-rounded { font-size: 18px; }
  .stage-card.is-selected .stage-card__check { display: flex; }

  /* 안내 팁 */
  .stage-tip {
    display: flex; gap: 14px; align-items: flex-start;
    margin-top: 24px; padding: 18px;
    background: #FBEAF0;
    border-radius: var(--radius-card);
  }
  .stage-tip__icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .stage-tip__title { font-size: 14px; font-weight: 700; }
  .stage-tip__desc { margin-top: 4px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
</style>
</head>
<body>
<div class="app">

  <header class="appbar">
    <button type="button" class="appbar__btn" data-back aria-label="뒤로가기">
      <span class="material-symbols-rounded">arrow_back_ios_new</span>
    </button>
  </header>

  <div class="content">

<h1 class="stage__title">현재 <em>단계</em>를 선택해주세요</h1>
    <p class="stage__desc">선택한 단계에 맞춰 맞춤 케어를 제공해드려요.<br>언제든지 마이페이지에서 변경할 수 있어요.</p>

    <div class="mt-24">
      <!-- 임신 준비 중 (선택됨) -->
      <button type="button" class="stage-card is-selected">
        <span class="stage-card__check"><span class="material-symbols-rounded">check</span></span>
        <span class="stage-card__illust" aria-hidden="true">🧘🏻‍♀️</span>
        <span class="stage-card__body">
          <span class="stage-card__name">임신 준비 중 <span class="chip chip--outline">추천</span></span>
          <span class="stage-card__desc">건강한 임신을 위한 준비와<br>영양 관리를 도와드려요.</span>
        </span>
        <span class="material-symbols-rounded stage-card__arrow">chevron_right</span>
      </button>

      <!-- 임신 중 -->
      <button type="button" class="stage-card">
        <span class="stage-card__check"><span class="material-symbols-rounded">check</span></span>
        <span class="stage-card__illust" aria-hidden="true">🤰🏻</span>
        <span class="stage-card__body">
          <span class="stage-card__name">임신 중</span>
          <span class="stage-card__desc">태아와 엄마의 건강을 위한<br>맞춤 케어를 제공해드려요.</span>
        </span>
        <span class="material-symbols-rounded stage-card__arrow">chevron_right</span>
      </button>

      <!-- 출산 후 -->
      <button type="button" class="stage-card">
        <span class="stage-card__check"><span class="material-symbols-rounded">check</span></span>
        <span class="stage-card__illust" aria-hidden="true">🤱🏻</span>
        <span class="stage-card__body">
          <span class="stage-card__name">출산 후</span>
          <span class="stage-card__desc">산후 회복과 육아를 위한<br>건강 관리를 도와드려요.</span>
        </span>
        <span class="material-symbols-rounded stage-card__arrow">chevron_right</span>
      </button>
    </div>

    <!-- 안내 -->
    <div class="stage-tip">
      <span class="stage-tip__icon">💡</span>
      <div>
        <p class="stage-tip__title">정확한 단계 선택이 중요해요!</p>
        <p class="stage-tip__desc">선택하신 단계에 맞는 정보와 알림이 제공됩니다.<br>나의 건강한 여정을 함께 응원할게요 💗</p>
      </div>
    </div>

  </div>

  <div class="bottom-cta">
    <a href="05_home.html" class="btn btn--primary">선택 완료</a>
  </div>

</div>
<script src="../assets/js/common.js"></script>
<script>
  // 단계 카드 단일 선택
  document.querySelectorAll('.stage-card').forEach(function (card) {
    card.addEventListener('click', function () {
      document.querySelectorAll('.stage-card').forEach(function (c) { c.classList.remove('is-selected'); });
      card.classList.add('is-selected');
    });
  });
</script>
</body>
</html>
