<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 07 약 등록 4/4 확인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<link rel="stylesheet" href="../assets/css/motion.css">
<link rel="stylesheet" href="../assets/css/register.css">
</head>
<body>
<div class="app">

  <header class="appbar">
    <button type="button" class="appbar__btn" data-back="07_register_3.html" aria-label="뒤로가기">
      <span class="material-symbols-rounded">arrow_back_ios_new</span>
    </button>
    <h1 class="appbar__title">약 등록</h1>
    <span class="appbar__spacer"></span>
  </header>

  <!-- 스텝 : 1·2·3완료 · 4활성 -->
  <div class="stepper">
    <div class="stepper__item is-done"><span class="stepper__num"><span class="material-symbols-rounded">check</span></span><span class="stepper__label">기본 정보</span></div>
    <span class="stepper__line is-done"></span>
    <div class="stepper__item is-done"><span class="stepper__num"><span class="material-symbols-rounded">check</span></span><span class="stepper__label">복용 정보</span></div>
    <span class="stepper__line is-done"></span>
    <div class="stepper__item is-done"><span class="stepper__num"><span class="material-symbols-rounded">check</span></span><span class="stepper__label">알림 설정</span></div>
    <span class="stepper__line is-done"></span>
    <div class="stepper__item is-active"><span class="stepper__num">4</span><span class="stepper__label">확인</span></div>
  </div>

  <div class="content">

    <!-- 요약 히어로 -->
    <div class="card reg-hero">
      <span class="reg-hero__thumb"><span class="material-symbols-rounded">medication</span></span>
      <div class="flex-1">
        <p class="reg-hero__name">철분제 <span class="chip">영양제</span></p>
        <p class="reg-hero__sub">아래 내용으로 등록할게요. 맞는지 확인해주세요.</p>
      </div>
    </div>

    <!-- 요약 -->
    <div class="card sum-card mt-16">
      <div class="sum-block">
        <div class="sum-block__head">
          <span class="sum-block__title">기본 정보</span>
          <a href="07_register.html" class="sum-edit"><span class="material-symbols-rounded">edit</span> 수정</a>
        </div>
        <div class="sum-rows">
          <div class="sum-row"><span class="k">약 이름</span><span class="v">철분제</span></div>
          <div class="sum-row"><span class="k">약 종류</span><span class="v">영양제</span></div>
          <div class="sum-row"><span class="k">제조사</span><span class="v">훼로바</span></div>
        </div>
      </div>

      <div class="sum-block">
        <div class="sum-block__head">
          <span class="sum-block__title">복용 정보</span>
          <a href="07_register_2.html" class="sum-edit"><span class="material-symbols-rounded">edit</span> 수정</a>
        </div>
        <div class="sum-rows">
          <div class="sum-row"><span class="k">복용 방법</span><span class="v">경구 (먹는 약)</span></div>
          <div class="sum-row"><span class="k">1회 복용량</span><span class="v">1정</span></div>
          <div class="sum-row"><span class="k">복용 주기</span><span class="v">매일</span></div>
          <div class="sum-row"><span class="k">복용 기간</span><span class="v">2024.06.02 ~ 12.31</span></div>
        </div>
      </div>

      <div class="sum-block">
        <div class="sum-block__head">
          <span class="sum-block__title">알림 설정</span>
          <a href="07_register_3.html" class="sum-edit"><span class="material-symbols-rounded">edit</span> 수정</a>
        </div>
        <div class="sum-rows">
          <div class="sum-row"><span class="k">복용 시간</span><span class="v">아침 09:00 · 저녁 19:00</span></div>
          <div class="sum-row"><span class="k">복용 전 알림</span><span class="v">정시</span></div>
          <div class="sum-row"><span class="k">알림 방식</span><span class="v">앱 · 푸시</span></div>
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-cta">
    <div class="reg-cta">
      <a href="07_register_3.html" class="btn btn--secondary">이전</a>
      <a href="06_medication.html" class="btn btn--primary"><span class="material-symbols-rounded">check_circle</span> 등록 완료</a>
    </div>
  </div>

</div>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/motion.js"></script>
</body>
</html>
