<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mom's Time — 34 언어 및 지역</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">
<link rel="stylesheet" href="../assets/css/common.css">
<link rel="stylesheet" href="../assets/css/motion.css">
<link rel="stylesheet" href="../assets/css/settings.css">
</head>
<body>
<div class="app">

  <header class="appbar">
    <button type="button" class="appbar__btn" data-back="15_my_page.html" aria-label="뒤로가기">
      <span class="material-symbols-rounded">arrow_back_ios_new</span>
    </button>
    <h1 class="appbar__title">언어 및 지역</h1>
    <span class="appbar__spacer"></span>
  </header>

  <p class="set-lead">언어와 날짜·시간 표시 형식을 설정해요.</p>

  <div class="content">

    <!-- 언어 -->
    <div class="section">
      <div class="section__head"><h2 class="section__title">언어</h2></div>
      <div class="opt-list" data-single>
        <button type="button" class="opt-row is-sel">한국어 <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">English <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">日本語 <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">中文 (简体) <span class="material-symbols-rounded check">check</span></button>
      </div>
    </div>

    <!-- 지역 -->
    <div class="section">
      <div class="section__head"><h2 class="section__title">국가 / 지역</h2></div>
      <div class="set-list">
        <a href="#" class="set-row">
          <span class="set-row__icon"><span class="material-symbols-rounded">public</span></span>
          <span class="set-row__body"><span class="set-row__title">국가</span></span>
          <span class="set-row__value">대한민국</span>
          <span class="material-symbols-rounded set-row__arrow">chevron_right</span>
        </a>
        <a href="#" class="set-row">
          <span class="set-row__icon"><span class="material-symbols-rounded">schedule</span></span>
          <span class="set-row__body"><span class="set-row__title">시간대</span></span>
          <span class="set-row__value">GMT+9 서울</span>
          <span class="material-symbols-rounded set-row__arrow">chevron_right</span>
        </a>
      </div>
    </div>

    <!-- 날짜 형식 -->
    <div class="section">
      <div class="section__head"><h2 class="section__title">날짜 형식</h2></div>
      <div class="opt-list" data-single>
        <button type="button" class="opt-row is-sel">2024. 06. 02 <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">06/02/2024 <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">02 Jun 2024 <span class="material-symbols-rounded check">check</span></button>
      </div>
    </div>

    <!-- 시간 형식 -->
    <div class="section">
      <div class="section__head"><h2 class="section__title">시간 형식</h2></div>
      <div class="opt-list" data-single>
        <button type="button" class="opt-row is-sel">오전 / 오후 (12시간) <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">24시간 <span class="material-symbols-rounded check">check</span></button>
      </div>
    </div>

    <!-- 주 시작 요일 -->
    <div class="section">
      <div class="section__head"><h2 class="section__title">주 시작 요일</h2></div>
      <div class="opt-list" data-single>
        <button type="button" class="opt-row is-sel">일요일 <span class="material-symbols-rounded check">check</span></button>
        <button type="button" class="opt-row">월요일 <span class="material-symbols-rounded check">check</span></button>
      </div>
    </div>

    <p class="set-note"><span class="material-symbols-rounded">info</span> 변경한 형식은 캘린더·복약 기록 등 앱 전체에 적용돼요.</p>

  </div>

</div>
<script src="../assets/js/common.js"></script>
<script>
  // 옵션 단일 선택
  document.querySelectorAll('.opt-list[data-single]').forEach(function (list) {
    list.addEventListener('click', function (e) {
      var row = e.target.closest('.opt-row'); if (!row) return;
      list.querySelectorAll('.opt-row').forEach(function (r) { r.classList.remove('is-sel'); });
      row.classList.add('is-sel');
    });
  });
</script>
<script src="../assets/js/motion.js"></script>
</body>
</html>
